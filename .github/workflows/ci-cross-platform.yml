name: Aurik CI Cross-Platform

# §15.4: Cross-Platform-Tests (Ubuntu, Windows, macOS)
# Nur bei push auf main oder manuellem Trigger (Kostenkontrolle)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-cross-platform:
    name: Test ${{ matrix.os }} (Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14
        python:
          - "3.10"

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
          pip install pytest pytest-xdist

      - name: Platform compatibility check
        run: python scripts/platform_compat_check.py

      - name: GPU capability detection
        run: python scripts/detect_gpu_capabilities.py --json

      - name: Run cross-platform tests (no GPU/ONNX)
        run: |
          pytest tests/ \
            -m "not slow and not gpu and not onnx" \
            -n auto \
            --timeout=300 \
            --strict-markers \
            -v \
            --tb=short \
            --no-header

      - name: ErrorGuard coverage audit
        run: python scripts/audit_error_guard_coverage.py --json-only

  platform-compat:
    name: Platform Compatibility Check
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run platform compat check
        run: |
          python scripts/platform_compat_check.py
