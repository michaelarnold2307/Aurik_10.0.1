name: Aurik CI Cross-Platform

# §15.4: Cross-Platform-Tests (Ubuntu, Windows, macOS)
# Nur bei push auf main oder manuellem Trigger (Kostenkontrolle)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  platform-compat:
    name: Platform Compatibility Check
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run platform compat check
        run: python scripts/platform_compat_check.py

  test-cross-platform:
    name: Test ${{ matrix.os }} (Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    needs: platform-compat
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          # NOTE: macOS nicht unterstützt (kein Apple Silicon CI verfügbar)
        python:
          - "3.10"
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy soundfile pytest pytest-timeout pyyaml
          pip install -e . 2>/dev/null || echo "editable install skipped, using PYTHONPATH"

      - name: GPU capability detection
        shell: bash
        run: python scripts/detect_gpu_capabilities.py --json || echo "GPU detection skipped"

      - name: ErrorGuard coverage audit
        shell: bash
        run: python scripts/audit_error_guard_coverage.py --json-only || echo "audit skipped"

      - name: Run cross-platform tests
        shell: bash
        run: |
          PYTHONPATH=. pytest tests/ \
            -m "not slow and not gpu and not onnx" \
            --timeout=60 \
            -x \
            -v \
            --tb=short \
            --no-header \
            --override-ini="addopts=" \
            -p no:cacheprovider \
            --ignore=tests/normative/test_competitive_ci_gate.py \
            --ignore=tests/normative/test_competitive_stratified_gate.py \
            2>&1 | tail -80

      - name: Quick smoke test
        shell: bash
        run: |
          python -c "
          import numpy as np
          print('numpy:', np.__version__)
          from benchmarks.regression.regression_gate import _make_music, compute_pqs
          music = _make_music(0.5)
          print('PQS self-test:', compute_pqs(music, music))
          print('Smoke test OK')
          "
